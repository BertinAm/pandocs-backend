services:
  - type: web
    name: pandocs-backend
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn pandocs_backend.wsgi:application"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.13.13"
      - key: DATABASE_URL
        fromDatabase:
          name: pandocs-db
          property: connectionString
      - key: CORS_EXTRA_ORIGINS
        value: "https://pandocs-frontend.vercel.app"

databases:
  - name: pandocs-db
    plan: free
